name: Update LeetCode Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # This is the magic line for manual testing!

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the Action permission to update your README
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Stats Update
        run: |
          javac UpdateStats.java
          java UpdateStats

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Updated LeetCode stats for tanujp15" || exit 0
          git push
